<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="container">
    <div class="card">
        <h2>Employee Registration</h2>

        <input type="text" id="username" placeholder="Username" required autocomplete="new-username" />
        <input
                type="email"
                name="email"
                id="email"
                placeholder="Email"
                required
                autocomplete="new-email">
        <input type="password" id="password" placeholder="Password" required autocomplete="new-password" />

        <select id="position" required>
            <option value="" selected disabled >Select your position</option>
            <option>Manager</option>
            <option>HR</option>
            <option>Counsellor</option>
            <option>Java Full Stack Developer</option>
            <option>Mern Stack Developer</option>

        </select>

        <button onclick="signup()">Register</button>

        <br><br>


        <a href="login.html">Login</a>
    </div>
</div>

<script>
    function signup() {

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const position = document.getElementById("position").value;

        if (username === "" || password === "") {
            alert("Username and Password are required");
            return;
        }
        if(position === ""){
        alert("Position is required");
        return;
        }

        const data = {
            username,
            password,
            position
        };

        fetch("/auth/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(response => response.text())
        .then(message => {
            alert(message);
            window.location.href = "/login.html";
        });
    }

</script>

</body>
</html>
