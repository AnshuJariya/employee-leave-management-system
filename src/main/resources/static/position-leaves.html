<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Position Wise Leaves</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <h1 id="title"></h1>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Employee</th>
      <th>Position</th>
      <th>Leave Type</th>
      <th>From Date</th>
      <th>To Date</th>
      <th>Reason</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody id="leaveTable"></tbody>

  </table>
</div>

<script>

  const params =
      new URLSearchParams(window.location.search);

  const position =
      params.get("position");

  document.getElementById("title")
          .innerText =
          position + " Leaves";

 fetch(
    "/admin/leaves/position/" +
    encodeURIComponent(position)
)
.then(res => res.json())
.then(data => {

    let rows = "";

   data.forEach(leave => {

    rows += `
    <tr>
        <td>${leave.employee.id}</td>
        <td>${leave.employee.username}</td>
        <td>${leave.employee.position}</td>
        <td>${leave.leaveType}</td>
        <td>${leave.fromDate}</td>
        <td>${leave.toDate}</td>
        <td>${leave.reason}</td>
        <td>
        <span class="status ${leave.status.toLowerCase()}">
            ${leave.status}
        </span>
    </td>
    <td>
        <button onclick="toggleStatus(${leave.id})">

            ${leave.status === 'APPROVED'
                ? 'Reject'
                : 'Approve'}
        </button>
    </td>
    </tr>
    `;
});

    document.getElementById("leaveTable").innerHTML = rows;
});
  function toggleStatus(id){

    fetch(`/admin/toggle/${id}`,{
        method:"PUT"
    })
    .then(() => loadPositionLeaves());
}
  function loadPositionLeaves(){

       fetch(
        "/admin/leaves/position/" +
        encodeURIComponent(position)
    )
    .then(res => res.json())
    .then(data => {

        let rows = "";

        data.forEach(leave => {

            rows += `
            <tr>
                <td>${leave.id}</td>
                <td>${leave.employee.username}</td>
                <td>${leave.employee.position}</td>
                <td>${leave.leaveType}</td>
                <td>${leave.fromDate}</td>
                <td>${leave.toDate}</td>
                <td>${leave.reason}</td>

                <td>
                    <span class="status ${leave.status.toLowerCase()}">
                        ${leave.status}
                    </span>
                </td>

                <td>
                    <button onclick="toggleStatus(${leave.id})">
                        ${leave.status === 'APPROVED'
                            ? 'Reject'
                            : 'Approve'}
                    </button>
                </td>
            </tr>
            `;
        });

        document.getElementById("leaveTable")
                .innerHTML = rows;
    });
}

</script>

</body>
</html>
